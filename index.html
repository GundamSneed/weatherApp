<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weatherApp</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#2b6fc8" />
  <link rel="preconnect" href="https://api.open-meteo.com" />
  <link rel="preconnect" href="https://geocoding-api.open-meteo.com" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <canvas id="bg-particles" aria-hidden="true"></canvas>
  <div class="app">
    <!-- Header: search + unit toggle -->
    <header class="header">
      <div class="search">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search a city..."
          autocomplete="off"
          aria-label="Search a city"
        />
        <ul class="search-results" id="search-results" hidden></ul>
      </div>
      <div class="unit-toggle" id="unit-toggle" role="group" aria-label="Temperature units">
        <button class="unit-btn is-active" data-unit="fahrenheit">°F</button>
        <button class="unit-btn" data-unit="celsius">°C</button>
      </div>
    </header>

    <!-- Sidebar: saved locations, hidden by default, revealed via the star tab -->
    <div class="sidebar-wrap" id="sidebar-wrap">
      <button
        class="sidebar-tab"
        id="sidebar-tab"
        aria-label="Show saved locations"
        aria-expanded="false"
        aria-controls="sidebar"
      >★</button>
      <aside class="sidebar" id="sidebar">
        <h2 class="sidebar-title">Saved</h2>
        <ul class="saved-list" id="saved-list">
          <!-- saved location cards injected here -->
        </ul>
        <p class="saved-empty" id="saved-empty">No saved locations yet. Search a city and tap the ★ to save it.</p>
      </aside>
    </div>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main: current weather + forecasts -->
    <main class="main" id="main">
      <p class="fallback-hint" id="fallback-hint" hidden></p>

      <section class="current" id="current">
        <div class="current-place">
          <h1 class="current-name" id="current-name">—</h1>
          <button class="save-btn" id="save-btn" aria-label="Save this location" hidden>☆</button>
        </div>
        <div class="current-primary">
          <div class="current-temp" id="current-temp">--°</div>
          <div class="current-status">
            <span class="current-icon" id="current-icon"></span>
            <span class="current-cond" id="current-cond">—</span>
          </div>
        </div>
        <div class="current-meta" id="current-meta"></div>
      </section>

      <section class="hourly" id="hourly" aria-label="Hourly forecast">
        <h2 class="section-title">Hourly</h2>
        <div class="hourly-strip" id="hourly-strip"></div>
      </section>

      <section class="daily" id="daily" aria-label="7-day forecast">
        <h2 class="section-title">7-Day Forecast</h2>
        <div class="daily-grid" id="daily-grid"></div>
      </section>

      <div class="panels-row">
        <section class="radar" id="radar" aria-label="Weather radar">
          <h2 class="section-title">Radar</h2>
          <div class="radar-map-wrap card">
            <div class="radar-map" id="radar-map"></div>
            <p class="radar-status" id="radar-status" hidden></p>
          </div>
        </section>

        <section class="news" id="news" aria-label="Local news">
          <h2 class="section-title">News</h2>
          <ul class="news-list card" id="news-list"></ul>
        </section>
      </div>

      <footer class="site-footer">
        <a
          class="site-footer-link"
          href="https://github.com/GundamSneed/weatherApp"
          target="_blank"
          rel="noopener noreferrer"
        >Built by <strong>GundamSneed</strong> with <strong>Claude</strong></a>
      </footer>
    </main>
  </div>

  <script src="js/particles.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="js/weatherCodes.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/radar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
